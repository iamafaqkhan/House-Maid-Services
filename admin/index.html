<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(120deg, #8A1538, #FFD700);
    color: #fff;
    margin:0; padding:0;
}
.container { width: 95%; max-width: 1200px; margin: 20px auto; }
h1 { text-align:center; margin-bottom: 20px; text-shadow:2px 2px #000; }

/* Stats cards */
.stats { display:flex; flex-wrap:wrap; justify-content:space-around; margin-bottom:20px; }
.card {
    background: rgba(0,0,0,0.3);
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:23%;
    margin:10px 0;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    transition: transform 0.3s;
}
.card:hover { transform: scale(1.05); }

/* Table container for scroll */
.table-container { overflow-x:auto; }

/* Table */
.table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    animation: fadeIn 1s ease;
}
.table th, .table td {
    padding: 10px;
    border: 1px solid #fff;
    text-align: center;
    background: rgba(0,0,0,0.3);
}
.table th {
    background: rgba(0,0,0,0.5);
    font-size: 16px;
}
.table tr:hover { background: rgba(255,215,0,0.3); transform: scale(1.01); transition: 0.3s; }

/* Buttons */
.button {
    padding: 5px 12px;
    background: #8A1538;
    color: #FFD700;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    display:inline-block;
}
.button:hover { background: #FFD700; color: #8A1538; transform: scale(1.05); }

/* Responsive */
@media(max-width:1024px) {
    .stats { flex-direction: row; flex-wrap: wrap; justify-content:space-around; }
    .card { width:45%; }
}

@media(max-width:768px) {
    .stats { flex-direction: column; align-items:center; }
    .card { width:80%; }
    table, form { font-size:14px; }
}

@media(max-width:480px) {
    input, select, .button { width:100%; box-sizing:border-box; }
    .table th, .table td { padding:5px; font-size:12px; }
}
</style>
</head>
<body>
<div class="container">
<h1>Admin Dashboard</h1>

<div class="stats">
    <div class="card">Total Bookings<br><span id="stat-total">...</span></div>
    <div class="card">Today Bookings<br><span id="stat-today">...</span></div>
    <div class="card">Pending<br><span id="stat-pending">...</span></div>
    <div class="card">Accepted<br><span id="stat-accepted">...</span></div>
</div>

<h2>Bookings</h2>
<div class="table-container">
<table class="table">
<tr><th>ID</th><th>Name</th><th>Phone</th><th>Service</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr>
<!-- Rows will be populated by Supabase JS -->
</table>
</div>

<div id="adminManagementSection" style="display: none;">
    <br><hr style="border-color: rgba(255,255,255,0.2);"><br>
    <h2>Admin Management</h2>
    <p style="text-align:center; font-size:14px; margin-bottom:20px;">Use this section to grant Dashboard access by associating active Supabase Auth user emails.</p>

<div class="table-container" style="margin-bottom: 20px;">
    <p id="adminMgmtStatus" style="text-align:center; font-size:14px; margin-bottom:10px; min-height:1em; color:#FFD700;"></p>
    <form id="addAdminForm" style="display:flex; justify-content:center; gap:10px; margin-bottom: 15px;">
        <input type="email" id="newAdminEmail" placeholder="New Admin Email" required style="padding:8px; border-radius:5px; border:none;">
        <select id="newAdminRole" style="padding:8px; border-radius:5px; border:none;">
            <option value="Admin">Admin</option>
            <option value="Main Admin">Main Admin</option>
        </select>
        <button type="submit" class="button">Add Admin Role</button>
    </form>

    <table class="table" id="adminsTable">
        <tr><th>ID</th><th>Email</th><th>Role</th><th>Created At</th><th>Actions</th></tr>
        <!-- Rows populated by Javascript -->
    </table>
</div>
</div>

<a href="/logout" id="logoutBtn" class="button">Logout</a>

</div>
<!-- SUPABASE FIX: Supabase config + client scripts -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
